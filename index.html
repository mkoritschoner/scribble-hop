<!DOCTYPE html>
<html>
<head>
    <title>Scribble Hop Web</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: Arial; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #555; background: #1e1e1e; }
        #ui { margin: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #00ff64; border: none; border-radius: 5px; font-weight: bold; }
        #status { margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="connectBtn">Connect M5Stick</button>
        <button id="disconnectBtn" style="display:none; background:#ff4444;">Disconnect</button>
        <span id="status">Disconnected</span>
        <div id="debug" style="font-size: 12px; color: #888; margin-top: 5px;"></div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        // Updated UUIDs to match Nordic UART Service (Standard for ESP32/M5 BLE)
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const TX_CHAR_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e"; // M5 -> Browser
        const RX_CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e"; // Browser -> M5

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('status');
        const debugText = document.getElementById('debug');

        // Game State
        let gameState = {
            hp: 3, score: 0, tiltX: 0,
            battery: "Unknown",
            posX: 200, posY: 400, vy: -15,
            gameOver: true, // Start in Game Over/Menu state
            invincibleUntil: 0,
            platforms: [], spikes: [], hearts: [],
            lastBLEUpdate: 0, writeChar: null, device: null
        };

        function resetGame() {
            gameState.hp = 3;
            gameState.score = 0;
            gameState.gameOver = false;
            gameState.posX = 200;
            gameState.posY = 400;
            gameState.vy = -15;
            gameState.invincibleUntil = 0;
            gameState.platforms = [];
            for(let i=0; i<10; i++) {
                gameState.platforms.push({x: Math.random()*340, y: 600 - (i*60), w: 60, h: 10});
            }
            gameState.spikes = [];
            gameState.hearts = [];
        }

        window.onload = () => {
            if (!navigator.bluetooth) {
                statusText.innerText = "Web Bluetooth not supported.";
                connectBtn.disabled = true;
            }
        };

        async function disconnect() {
            if (gameState.device && gameState.device.gatt.connected) {
                await gameState.device.gatt.disconnect();
            }
        }

        document.getElementById('disconnectBtn').addEventListener('click', disconnect);

        // --- NEW BLUETOOTH CONNECTION BLOCK ---
        connectBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "Requesting Device...";
                debugText.innerText = "";
                
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "M5-Scribble-Hop" }],
                    optionalServices: [SERVICE_UUID]
                });

                gameState.device = device;
                device.addEventListener('gattserverdisconnected', () => {
                    statusText.innerText = "Disconnected";
                    statusText.style.color = "white";
                    connectBtn.style.display = "inline";
                    document.getElementById('disconnectBtn').style.display = "none";
                });

                statusText.innerText = "Connecting...";
                const server = await device.gatt.connect();
                
                statusText.innerText = "Getting Service...";
                const service = await server.getService(SERVICE_UUID);
                
                // Setup Notifications for incoming data (IMU + Buttons)
                statusText.innerText = "Setup Notifications...";
                const txChar = await service.getCharacteristic(TX_CHAR_UUID);
                await txChar.startNotifications();
                
                txChar.addEventListener('characteristicvaluechanged', (e) => {
                    const decoder = new TextDecoder();
                    const val = decoder.decode(e.target.value);
                    const data = val.split(','); // Format: Bat,BtnA,AccelX,AccelY
                    
                    if (data.length >= 4) {
                        gameState.battery = data[0];
                        // Handle Restart with Button A
                        if (data[1] === "1" && gameState.gameOver) {
                            resetGame();
                        }
                        // Handle Movement
                        gameState.tiltX = parseFloat(data[2]); 
                    }
                });

                // Get characteristic for sending data back to M5
                gameState.writeChar = await service.getCharacteristic(RX_CHARACTERISTIC_UUID);

                statusText.innerText = "Connected!";
                statusText.style.color = "#00ff64";
                connectBtn.style.display = "none";
                document.getElementById('disconnectBtn').style.display = "inline";
                
                resetGame();
                requestAnimationFrame(gameLoop);
            } catch (err) {
                console.error(err);
                statusText.innerText = "Failed";
                debugText.innerText = err.message;
            }
        });
        // --- END OF CONNECTION BLOCK ---

        async function updateM5Display() {
            const now = Date.now();
            // Don't overwhelm the M5 Bluetooth stack (max ~10 updates per second)
            if (!gameState.writeChar || now - gameState.lastBLEUpdate < 150) return;

            const mode = gameState.gameOver ? "G" : (now < gameState.invincibleUntil ? "I" : "N");
            const msg = `${mode}|${gameState.hp}|${Math.floor(gameState.score)}`;
            
            try {
                await gameState.writeChar.writeValueWithResponse(new TextEncoder().encode(msg));
                gameState.lastBLEUpdate = now;
            } catch(e) {
                // Silently handle write errors
            }
        }

        let lastTime = 0;
        function gameLoop(timestamp) {
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            if (dt > 0.1) dt = 0.1;

            if (!gameState.gameOver) {
                const subSteps = 4;
                const stepDt = dt / subSteps;
                const nowTicks = Date.now();

                for (let i = 0; i < subSteps; i++) {
                    // Movement logic
                    gameState.posX += (gameState.tiltX * 500) * stepDt;
                    gameState.vy += 2880 * stepDt;
                    gameState.posY += gameState.vy * stepDt;

                    if (gameState.posX < 0) gameState.posX = 0;
                    if (gameState.posX > 370) gameState.posX = 370;

                    // Platform collision
                    if (gameState.vy > 0) {
                        for (let p of gameState.platforms) {
                            if (gameState.posX < p.x + p.w && gameState.posX + 30 > p.x &&
                                gameState.posY + 30 > p.y && gameState.posY + 30 < p.y + 10) {
                                gameState.vy = -1200;
                                gameState.posY = p.y - 30;
                            }
                        }
                    }
                }

                // Scrolling
                if (gameState.posY < 200) {
                    const scroll = 200 - gameState.posY;
                    gameState.posY = 200;
                    gameState.score += scroll / 10;
                    gameState.platforms.forEach(p => p.y += scroll);
                }

                // Platform recycling
                let topY = Math.min(...gameState.platforms.map(p => p.y));
                gameState.platforms.forEach(p => {
                    if (p.y > 600) {
                        p.y = topY - 60;
                        p.x = Math.random() * 340;
                        topY = p.y;
                    }
                });

                if (gameState.hp <= 0 || gameState.posY > 600) gameState.gameOver = true;
            }

            draw();
            updateM5Display();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#6464ff';
            gameState.platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

            const isInvinc = Date.now() < gameState.invincibleUntil;
            if (!isInvinc || Math.floor(Date.now() / 100) % 2 === 0) {
                ctx.fillStyle = '#00ff64';
                ctx.fillRect(gameState.posX, gameState.posY, 30, 30);
            }

            ctx.fillStyle = 'white';
            ctx.font = '24px Arial';
            ctx.fillText(`Score: ${Math.floor(gameState.score)}`, 20, 40);
            ctx.fillStyle = '#ff6464';
            ctx.fillText(`HP: ${gameState.hp}`, 20, 70);

            if (gameState.gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffff00';
                ctx.font = '30px Arial';
                ctx.fillText("GAME OVER", 110, 280);
                ctx.font = '18px Arial';
                ctx.fillText("Press Button A to Restart", 100, 320);
            }
        }
    </script>
</body>
</html>
