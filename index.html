<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribble Hop Web</title>
    <style>
        body { background: #1e1e1e; color: white; font-family: Arial; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        canvas { border: 2px solid #444; background: #1e1e1e; margin-top: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .controls { padding: 20px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #00ff64; border: none; border-radius: 5px; font-weight: bold; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 10px; color: #00c8ff; }
    </style>
</head>
<body>
    <div class="controls">
        <button id="connectBtn">Connect M5StickC Plus 2</button>
        <div id="status">Status: Disconnected</div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script src="game.js"></script>
</body>
</html>
