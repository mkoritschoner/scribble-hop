<!DOCTYPE html>
<html>
<head>
    <title>Scribble Hop Web</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: Arial; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #555; background: #1e1e1e; }
        #ui { margin: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #00ff64; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="connectBtn">Connect M5Stick</button>
        <span id="status">Disconnected</span>
        <div id="debug" style="font-size: 12px; color: #888; margin-top: 5px;"></div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        // UUIDs matching context
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const IMU_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        const BTN_CHAR_UUID = "d601556a-127e-4689-9856-11f26a5c2d3a";
        const DISP_CHAR_UUID = "f6323862-23c3-424a-95f7-6799052d0b57";
        const BAT_CHAR_UUID = "0e82c815-46b0-4660-8480-161b203c9071";

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('status');
        const debugText = document.getElementById('debug');

        // Game State
        let gameState = {
            hp: 3, score: 0, tiltX: 0,
            battery: "Unknown",
            posX: 200, posY: 400, vy: -15,
            gameOver: false, invincibleUntil: 0,
            platforms: [], spikes: [], hearts: [],
            lastBLEUpdate: 0, writeChar: null
        };

        function resetGame() {
            gameState.hp = 3;
            gameState.score = 0;
            gameState.gameOver = false;
            gameState.posX = 200;
            gameState.posY = 400;
            gameState.vy = -15;
            gameState.invincibleUntil = 0;
            gameState.platforms = [];
            for(let i=0; i<10; i++) {
                gameState.platforms.push({x: Math.random()*340, y: 600 - (i*60), w: 60, h: 10});
            }
            gameState.spikes = [];
            gameState.hearts = [];
        }

        // Check for Web Bluetooth Support on Load
        window.onload = () => {
            if (!navigator.bluetooth) {
                statusText.innerText = "Web Bluetooth not supported/enabled in this browser.";
                connectBtn.disabled = true;
            }
        };

        // Bluetooth Logic
        connectBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "Scanning...";
                debugText.innerText = "";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "M5Stick-Controller" }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getService(SERVICE_UUID);
                
                // Setup Notifications
                const imuChar = await service.getCharacteristic(IMU_CHAR_UUID);
                await imuChar.startNotifications();
                imuChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    const axes = val.split(',');
                    gameState.tiltX = parseFloat(axes[1]); // Sideways Y-axis
                });

                const btnChar = await service.getCharacteristic(BTN_CHAR_UUID);
                await btnChar.startNotifications();
                btnChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    if (val === "A" && gameState.gameOver) resetGame();
                });

                gameState.writeChar = await service.getCharacteristic(DISP_CHAR_UUID);

                // Initial battery read (parity with PygameSim.py)
                const batChar = await service.getCharacteristic(BAT_CHAR_UUID);
                const batVal = await batChar.readValue();
                gameState.battery = new TextDecoder().decode(batVal);
                
                statusText.innerText = `Connected (${gameState.battery}%)`;
                connectBtn.style.display = "none";
                resetGame();
                requestAnimationFrame(gameLoop);
            } catch (err) {
                console.error(err);
                statusText.innerText = "Connection Failed";
                debugText.innerText = err.name === "NotFoundError" 
                    ? "Device not found or cancelled." 
                    : "Error: " + err.message + ". Try 'Forgetting' the device in Windows settings first.";
            }
        });

        async function updateM5Display() {
            const now = Date.now();
            if (!gameState.writeChar || now - gameState.lastBLEUpdate < 150) return;

            const mode = gameState.gameOver ? "G" : (now < gameState.invincibleUntil ? "I" : "N");
            const msg = `${mode}|${gameState.hp}|${Math.floor(gameState.score)}`;
            
            try {
                await gameState.writeChar.writeValueWithResponse(new TextEncoder().encode(msg));
                gameState.lastBLEUpdate = now;
            } catch(e) {}
        }

        let lastTime = 0;
        function gameLoop(timestamp) {
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            if (dt > 0.1) dt = 0.1;

            if (!gameState.gameOver) {
                // Physics sub-stepping (matching PygameSim.py)
                const subSteps = 4;
                const stepDt = dt / subSteps;
                const nowTicks = Date.now();

                for (let i = 0; i < subSteps; i++) {
                    gameState.posX += (gameState.tiltX * 480) * stepDt;
                    gameState.vy += 2880 * stepDt;
                    gameState.posY += gameState.vy * stepDt;

                    // Boundaries
                    if (gameState.posX < 0) gameState.posX = 0;
                    if (gameState.posX > 370) gameState.posX = 370;

                    // Collision
                    if (gameState.vy > 0) {
                        for (let p of gameState.platforms) {
                            if (gameState.posX < p.x + p.w && gameState.posX + 30 > p.x &&
                                gameState.posY + 30 > p.y && gameState.posY + 30 < p.y + 10) {
                                gameState.vy = -1200;
                                gameState.posY = p.y - 30;
                                break;
                            }
                        }
                    }

                    // Spikes & Hearts
                    if (nowTicks > gameState.invincibleUntil) {
                        gameState.spikes = gameState.spikes.filter(s => {
                            const hit = (gameState.posX < s.x + 20 && gameState.posX + 30 > s.x &&
                                         gameState.posY < s.y + 20 && gameState.posY + 30 > s.y);
                            if (hit) {
                                gameState.hp--;
                                gameState.invincibleUntil = nowTicks + 2000;
                            }
                            return !hit;
                        });
                    }

                    gameState.hearts = gameState.hearts.filter(h => {
                        const hit = (gameState.posX < h.x + 20 && gameState.posX + 30 > h.x &&
                                     gameState.posY < h.y + 20 && gameState.posY + 30 > h.y);
                        if (hit) gameState.hp = Math.min(3, gameState.hp + 1);
                        return !hit;
                    });
                }

                // Scrolling
                if (gameState.posY < 200) {
                    const scroll = 200 - gameState.posY;
                    gameState.posY = 200;
                    gameState.score += scroll / 10;
                    gameState.platforms.forEach(p => p.y += scroll);
                    gameState.spikes.forEach(s => s.y += scroll);
                    gameState.hearts.forEach(h => h.y += scroll);
                }

                // Recycling
                let topY = Math.min(...gameState.platforms.map(p => p.y));
                gameState.platforms.forEach(p => {
                    if (p.y > 600) {
                        topY -= 60;
                        p.y = topY;
                        p.x = Math.random() * 340;
                        const roll = Math.random();
                        if (roll < 0.2) gameState.spikes.push({x: p.x + 20, y: p.y - 20});
                        else if (roll < 0.3) gameState.hearts.push({x: p.x + 20, y: p.y - 30});
                    }
                });
                gameState.spikes = gameState.spikes.filter(s => s.y < 650);
                gameState.hearts = gameState.hearts.filter(h => h.y < 650);

                if (gameState.hp <= 0 || gameState.posY > 600) gameState.gameOver = true;
            }

            draw();
            updateM5Display();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Platforms
            ctx.fillStyle = '#6464ff';
            gameState.platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

            // Spikes (Grey Triangles)
            ctx.fillStyle = '#969696';
            gameState.spikes.forEach(s => {
                ctx.beginPath();
                ctx.moveTo(s.x, s.y + 20);
                ctx.lineTo(s.x + 20, s.y + 20);
                ctx.lineTo(s.x + 10, s.y);
                ctx.fill();
            });

            // Hearts
            ctx.fillStyle = '#ff3232';
            gameState.hearts.forEach(h => {
                ctx.beginPath();
                ctx.arc(h.x + 5, h.y + 8, 7, 0, Math.PI * 2);
                ctx.arc(h.x + 15, h.y + 8, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(h.x, h.y + 10);
                ctx.lineTo(h.x + 20, h.y + 10);
                ctx.lineTo(h.x + 10, h.y + 20);
                ctx.fill();
            });

            // Player (flicker)
            const isInvinc = Date.now() < gameState.invincibleUntil;
            if (!isInvinc || Math.floor(Date.now() / 100) % 2 === 0) {
                ctx.fillStyle = '#00ff64';
                ctx.fillRect(gameState.posX, gameState.posY, 30, 30);
            }

            // UI
            ctx.fillStyle = 'white';
            ctx.font = '24px Arial';
            ctx.fillText(`Score: ${Math.floor(gameState.score)}`, 20, 40);
            ctx.fillStyle = '#ff6464';
            ctx.fillText(`HP: ${gameState.hp}`, 20, 70);

            if (gameState.gameOver) {
                ctx.fillStyle = '#ffff00';
                ctx.fillText("GAME OVER", 130, 300);
                ctx.font = '18px Arial';
                ctx.fillText("Press Button A on M5Stick", 95, 330);
            }
        }
    </script>
</body>
</html>
